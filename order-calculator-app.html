<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>מחשבון והזמנת כמויות</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: { sans: ['Heebo', 'sans-serif'] },
          colors: {
            brand: {
              50: '#f0fdfa', 100: '#ccfbf1',
              500: '#14b8a6', 600: '#0d9488',
              700: '#0f766e', 900: '#134e4a'
            }
          },
          boxShadow: { soft: '0 10px 30px rgba(15,23,42,0.08)' }
        }
      }
    }
  </script>
  <style>
    body { font-family: 'Heebo', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }
  </style>
</head>
<body class="bg-slate-100 text-slate-900 min-h-screen">
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script type="text/babel">
    const { useMemo, useState } = React;

    const productsList = [
      { id: 1,  cat: '24', name: '32 x 32 x',   price: 0 },
      { id: 2,  cat: '24', name: '32 x 32 x',   price: 0 },
      { id: 3,  cat: '24', name: '32 x 32 x',   price: 0 },
      { id: 4,  cat: '24', name: '32 x 25 x',   price: 0 },
      { id: 5,  cat: '24', name: '32 x 25 x',   price: 0 },
      { id: 6,  cat: '24', name: '32 x 25 x',   price: 0 },
      { id: 7,  cat: '24', name: '32 x 25 x',   price: 0 },
      { id: 8,  cat: '24', name: '32 x 20 x',   price: 0 },
      { id: 9,  cat: '24', name: '32 x 20 x',   price: 0 },
      { id: 10, cat: '24', name: '32 x 16 x',   price: 0 },
      { id: 11, cat: '24', name: '25 x 32 x',   price: 0 },
      { id: 12, cat: '24', name: '25 x 25 x',   price: 0 },
      { id: 13, cat: '24', name: '25 x 25 x',   price: 0 },
      { id: 14, cat: '24', name: '25 x 25 x',   price: 0 },
      { id: 15, cat: '24', name: '25 x 20 x',   price: 0 },
      { id: 16, cat: '24', name: '25 x 20 x',   price: 0 },
      { id: 17, cat: '24', name: '25 x 20 x',   price: 0 },
      { id: 18, cat: '24', name: '25 x 16 x',   price: 0 },
      { id: 19, cat: '24', name: '25 x 16 x',   price: 0 },
      { id: 20, cat: '24', name: '25 x 16 x',   price: 0 },
      { id: 21, cat: '24', name: '20 x 25 x',   price: 0 },
      { id: 22, cat: '24', name: '20 x 25 x',   price: 0 },
      { id: 23, cat: '24', name: '20 x 20 x',   price: 0 },
      { id: 24, cat: '24', name: '20 x 20 x',   price: 0 },
      { id: 25, cat: '24', name: '20 x 16 x',   price: 0 },
      { id: 26, cat: '24', name: '20 x 16 x',   price: 0 },
      { id: 27, cat: '24', name: '16 x 20 x',   price: 0 },
      { id: 28, cat: '24', name: '16 x 16 x',   price: 0 },
      { id: 29, cat: '24', name: '32 x 32',     price: 0 },
      { id: 30, cat: '24', name: '25 x 25',     price: 0 },
      { id: 31, cat: '24', name: '20 x 20',     price: 0 },
      { id: 32, cat: '24', name: '16 x 16',     price: 0 },
      { id: 33, cat: '23', name: '32 x 32 x',   price: 0 },
      { id: 34, cat: '23', name: '25 x 25 x',   price: 0 },
      { id: 35, cat: '23', name: '25 x 3/4"',   price: 0 },
      { id: 36, cat: '23', name: '20 x 20 x',   price: 0 },
      { id: 37, cat: '23', name: '20 x 3/4"',   price: 0 },
      { id: 38, cat: '23', name: '20 x 1/2"',   price: 0 },
      { id: 39, cat: '23', name: '16 x 16 x',   price: 0 },
      { id: 40, cat: '23', name: '16 x 1/2"',   price: 0 },
      { id: 41, cat: '22', name: '25 x 3/4"',   price: 0 },
      { id: 42, cat: '22', name: '20 x 3/4"',   price: 0 },
      { id: 43, cat: '22', name: '20 x 1/2"',   price: 0 },
      { id: 44, cat: '22', name: '20 x 1/2"',   price: 0 },
      { id: 45, cat: '22', name: '20 x 1/2"',   price: 0 },
      { id: 46, cat: '22', name: '16 x 1/2"',   price: 0 },
      { id: 47, cat: '22', name: '16 x 1/2"',   price: 0 },
      { id: 48, cat: '22', name: '16 x 1/2"',   price: 0 },
    ];

    const catColors = {
      '24': { bg: 'bg-sky-50', border: 'border-sky-200', badge: 'bg-sky-100 text-sky-700', header: 'bg-sky-600' },
      '23': { bg: 'bg-violet-50', border: 'border-violet-200', badge: 'bg-violet-100 text-violet-700', header: 'bg-violet-600' },
      '22': { bg: 'bg-amber-50', border: 'border-amber-200', badge: 'bg-amber-100 text-amber-700', header: 'bg-amber-600' },
    };

    // Group products by category
    const grouped = productsList.reduce((acc, p) => {
      if (!acc[p.cat]) acc[p.cat] = [];
      acc[p.cat].push(p);
      return acc;
    }, {});

    function App() {
      const [quantities, setQuantities] = useState(
        Object.fromEntries(productsList.map(p => [p.id, '']))
      );

      const updateQuantity = (id, value) => {
        const v = value === '' ? '' : Math.max(0, Number(value) || 0);
        setQuantities(prev => ({ ...prev, [id]: v }));
      };

      const summary = useMemo(() => {
        const items = productsList
          .map(p => {
            const qty = Number(quantities[p.id]) || 0;
            return { ...p, quantity: qty };
          })
          .filter(i => i.quantity > 0);

        const totalQuantity = items.reduce((s, i) => s + i.quantity, 0);
        return { items, totalQuantity };
      }, [quantities]);

      const submitOrder = () => {
        if (summary.items.length === 0) {
          alert('יש לבחור לפחות מוצר אחד לפני שליחת ההזמנה');
          return;
        }

        const payload = {
          items: summary.items.map(({ id, cat, name, quantity }) => ({ id, cat, name, quantity })),
          totalQuantity: summary.totalQuantity,
          createdAt: new Date().toISOString()
        };

        console.log('📦 הזמנה נשלחה:', payload);

        const lines = summary.items.map(i => `• ${i.cat} – ${i.name}: ${i.quantity} יח׳`).join('\n');
        alert(`✅ ההזמנה נשלחה בהצלחה!\n\nסה"כ: ${summary.totalQuantity} פריטים\n\n${lines}`);
      };

      const resetAll = () => {
        setQuantities(Object.fromEntries(productsList.map(p => [p.id, ''])));
      };

      return (
        <main className="mx-auto max-w-6xl px-4 py-6 sm:px-6 lg:px-8">

          {/* Header */}
          <section className="mb-6 rounded-3xl bg-gradient-to-l from-brand-700 to-brand-500 p-6 text-white shadow-soft sm:p-8">
            <div className="flex items-start justify-between gap-4 flex-wrap">
              <div>
                <span className="mb-3 inline-flex rounded-full bg-white/15 px-3 py-1 text-sm font-medium backdrop-blur">
                  אפליקציית הזמנות
                </span>
                <h1 className="text-2xl font-extrabold sm:text-3xl">מחשבון והזמנת כמויות</h1>
                <p className="mt-2 text-sm text-white/90 sm:text-base">
                  הזן כמויות לכל מוצר וקבל סיכום מיידי.
                </p>
              </div>
              <div className="flex gap-3">
                <div className="rounded-2xl bg-white/10 px-4 py-3 text-right backdrop-blur">
                  <div className="text-xs text-white/80">סה״כ פריטים</div>
                  <div className="text-2xl font-bold">{summary.totalQuantity}</div>
                </div>
              </div>
            </div>
          </section>

          <div className="grid gap-6 lg:grid-cols-[1fr_320px]">

            {/* Products */}
            <div className="space-y-6">
              {Object.entries(grouped).map(([cat, products]) => {
                const colors = catColors[cat] || catColors['24'];
                return (
                  <div key={cat} className={`rounded-3xl border ${colors.border} ${colors.bg} overflow-hidden shadow-soft`}>
                    <div className={`${colors.header} px-5 py-3 flex items-center gap-3`}>
                      <span className="text-white text-lg font-extrabold">קטגוריה {cat}</span>
                      <span className="mr-auto text-white/80 text-sm">{products.length} מוצרים</span>
                    </div>

                    <div className="divide-y divide-white/60 p-2 sm:p-3">
                      {products.map((product, idx) => {
                        const qty = quantities[product.id];
                        const qtyNum = Number(qty) || 0;

                        return (
                          <div key={product.id}
                            className={`flex items-center gap-3 rounded-xl px-3 py-3 transition
                              ${qtyNum > 0 ? 'bg-white shadow-sm' : 'hover:bg-white/50'}`}>

                            {/* Row number */}
                            <span className="w-6 shrink-0 text-center text-xs font-bold text-slate-400">{idx + 1}</span>

                            {/* Product name */}
                            <span className="flex-1 font-semibold text-slate-800 text-sm sm:text-base">
                              {cat} – {product.name}
                            </span>

                            {/* Qty controls */}
                            <div className="flex items-center gap-1 shrink-0">
                              <button
                                onClick={() => updateQuantity(product.id, Math.max(0, qtyNum - 1))}
                                className="w-8 h-8 rounded-lg bg-slate-200 text-slate-700 font-bold text-lg flex items-center justify-center hover:bg-slate-300 active:scale-95 transition"
                                aria-label="הורד כמות"
                              >−</button>
                              <input
                                type="number"
                                min="0"
                                value={qty}
                                placeholder="0"
                                onChange={e => updateQuantity(product.id, e.target.value)}
                                className="w-14 rounded-xl border border-slate-300 bg-white px-2 py-1.5 text-center text-base font-bold outline-none focus:border-brand-500 transition"
                              />
                              <button
                                onClick={() => updateQuantity(product.id, qtyNum + 1)}
                                className="w-8 h-8 rounded-lg bg-brand-500 text-white font-bold text-lg flex items-center justify-center hover:bg-brand-600 active:scale-95 transition"
                                aria-label="הוסף כמות"
                              >+</button>
                            </div>

                            {/* Qty badge */}
                            {qtyNum > 0 && (
                              <span className={`hidden sm:inline-flex shrink-0 rounded-full px-2 py-0.5 text-xs font-bold ${colors.badge}`}>
                                {qtyNum} יח׳
                              </span>
                            )}
                          </div>
                        );
                      })}
                    </div>
                  </div>
                );
              })}
            </div>

            {/* Summary sidebar */}
            <aside className="rounded-3xl bg-white p-4 shadow-soft sm:p-6 lg:sticky lg:top-6 lg:self-start">
              <h2 className="text-xl font-bold text-slate-900">סיכום הזמנה</h2>
              <p className="mt-1 text-sm text-slate-500">מתעדכן אוטומטית.</p>

              <div className="mt-4 rounded-2xl bg-brand-50 p-4 text-center">
                <div className="text-sm text-brand-700 font-medium">סה״כ פריטים</div>
                <div className="text-4xl font-extrabold text-brand-900 mt-1">{summary.totalQuantity}</div>
              </div>

              <div className="mt-4 rounded-2xl border border-dashed border-slate-200 p-3 max-h-72 overflow-y-auto">
                <h3 className="text-sm font-bold text-slate-700 mb-2">מוצרים שנבחרו</h3>
                {summary.items.length === 0 ? (
                  <p className="text-sm text-slate-400">עדיין לא הוזנו כמויות.</p>
                ) : (
                  <div className="space-y-2">
                    {summary.items.map(item => (
                      <div key={item.id} className="flex items-center justify-between gap-2 text-sm">
                        <span className="text-slate-700 truncate">{item.cat} – {item.name}</span>
                        <span className="shrink-0 font-bold text-brand-700 bg-brand-50 rounded-full px-2 py-0.5 text-xs">
                          {item.quantity} יח׳
                        </span>
                      </div>
                    ))}
                  </div>
                )}
              </div>

              <button
                onClick={submitOrder}
                className="mt-5 w-full rounded-2xl bg-brand-600 px-4 py-3 text-base font-bold text-white shadow-sm transition hover:bg-brand-700 active:scale-[0.99]"
              >
                ✅ שלח הזמנה
              </button>

              <button
                onClick={resetAll}
                className="mt-2 w-full rounded-2xl border border-slate-200 px-4 py-2.5 text-sm font-medium text-slate-600 transition hover:bg-slate-100 active:scale-[0.99]"
              >
                🔄 אפס הכל
              </button>

              <p className="mt-3 text-center text-xs text-slate-400">
                הנתונים נשלחים ל-Console ומוצגים ב-Popup.
              </p>
            </aside>
          </div>
        </main>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
